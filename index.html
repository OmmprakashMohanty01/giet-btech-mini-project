<!DOCTYPE html>
<html>
<head>
    <title>Library Management System</title>
</head>
<body>
    <h1>Library Management System</h1>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Books</a></li>
            <li><a href="#">Members</a></li>
            <li><a href="#">Issue/Return</a></li>
        </ul>
    </nav>
    <div id="main">
        <h2>Welcome to Library Management System</h2>
        <p>This is a simple web application for managing a college library.</p>
    </div>
</body>

<div id="content">
  <form id="issue-return-form">
    <h3>Issue/Return Book</h3>
    <label for="member-id">Member ID:</label>
    <input type="text" id="member-id" name="member-id"><br><br>
    <label for="book-id">Book ID:</label>
    <input type="text" id="book-id" name="book-id"><br><br>
    <input type="submit" value="Issue/Return">
  </form>
</div>

<div id="content">
  <!-- Search Bar for Member ID -->
  <form id="search-member-form">
    <h3>Search Member</h3>
    <label for="search-member-id">Member ID:</label>
    <input type="text" id="search-member-id" name="search-member-id"><br><br>
    <input type="submit" value="Search">
  </form>
  <div id="search-member-results">
    <!-- Search results will be displayed here -->
  </div>
</div>

<div id="content">
  <!-- Display Member Details -->
  <form id="member-details-form" style="display: none;">
    <h3>Member Details:</h3>
    <label for="member-details-id">Member ID:</label>
    <input type="text" id="member-details-id" name="member-id" readonly><br><br>
    <label for="member-details-name">Member Name:</label>
    <input type="text" id="member-details-name" name="member-name" readonly><br><br>
    <label for="member-details-email">Member Email:</label>
    <input type="email" id="member-details-email" name="member-email" readonly><br><br>
  </form>
</div>

<script src="script.js"></script>
